<!DOCTYPE html>
<html>
<head>
  <title>Fuel Dashboard Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { margin:0; font-family:Arial; background:#eef2f7; }

    header {
      background:#1f2d3d;
      color:white;
      padding:15px;
      display:flex;
      align-items:center;
      gap:10px;
    }

    header img { width:40px; }

    .menu {
      display:flex;
      gap:10px;
      padding:10px;
      background:#fff;
    }

    .menu button {
      flex:1;
      padding:10px;
      border:none;
      background:#3498db;
      color:white;
      border-radius:8px;
    }

    .container { padding:15px; }

    .card {
      background:white;
      border-radius:12px;
      padding:15px;
      margin-top:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.08);
    }

    input, select {
      width:100%;
      padding:12px;
      margin-top:8px;
      border-radius:8px;
      border:1px solid #ddd;
    }

    .btn {
      margin-top:10px;
      background:#27ae60;
      color:white;
      padding:12px;
      border:none;
      border-radius:8px;
      width:100%;
    }

    .grid-kpi {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }

    .kpi {
      padding:15px;
      border-radius:12px;
      color:white;
      text-align:center;
    }

    .blue { background:#3498db; }
    .orange { background:#f39c12; }
    .green { background:#2ecc71; }

    table {
      width:100%;
      margin-top:10px;
      border-collapse:collapse;
    }

    th, td {
      border:1px solid #ddd;
      padding:8px;
    }

    th { background:#eee; }

    .hidden { display:none; }

    .cartoon {
      text-align:center;
      font-size:40px;
    }
  </style>
</head>

<body>

<header>
  <img src="https://cdn-icons-png.flaticon.com/512/743/743922.png">
  <h3>Fuel Company Dashboard</h3>
</header>

<div class="menu">
  <button onclick="showPage('dashboard')">Dashboard</button>
  <button onclick="showPage('report')">Report</button>
  <button onclick="showPage('monitor')">Admin</button>
</div>

<div class="container">

<div id="loginPage">
  <div class="card">
    <h3>🔐 Login</h3>
    <input id="user" placeholder="A หรือ admin">
    <input id="pass" type="password" placeholder="1234">
    <button class="btn" onclick="login()">Login</button>
  </div>
</div>

<div id="dashboard" class="hidden">

  <div class="cartoon">⛽🚗✨</div>

  <div class="grid-kpi">
    <div class="kpi blue"><h4>Total</h4><h2 id="total">0</h2></div>
    <div class="kpi orange"><h4>Diesel</h4><h2 id="dieselTotal">0</h2></div>
    <div class="kpi green"><h4>Benzine</h4><h2 id="benzineTotal">0</h2></div>
  </div>

  <div class="card">
    <h3>➕ เพิ่มข้อมูล</h3>
    <input type="date" id="date">
    <select id="type">
      <option>Diesel</option>
      <option>Benzine</option>
    </select>
    <input type="number" id="liters" placeholder="ลิตร">
    <button class="btn" onclick="addData()">บันทึก</button>
  </div>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    <canvas id="pieChart"></canvas>
  </div>

</div>

<div id="report" class="hidden">
  <div class="card">
    <h3>📋 ตารางข้อมูล</h3>
    <table id="table"></table>
  </div>
</div>

<div id="monitor" class="hidden">
  <div class="card">
    <h3>🖥️ Monitoring</h3>
    <canvas id="allChart"></canvas>
  </div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCsjWzbGXCXv-DbjUGNi01OHh3B_f8JkDw",
  authDomain: "gas-monitoring-79de7.firebaseapp.com",
  projectId: "gas-monitoring-79de7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser="";
let chart,pieChart,allChart;

window.login=function(){
  if(pass.value!=="1234") return alert("รหัสผิด");

  currentUser=user.value;
  loginPage.style.display="none";
  dashboard.classList.remove("hidden");

  loadData();
};

window.showPage=function(p){
  dashboard.classList.add("hidden");
  report.classList.add("hidden");
  monitor.classList.add("hidden");

  document.getElementById(p).classList.remove("hidden");

  if(p==="report") loadData();
  if(p==="monitor") loadAll();
};

window.addData=async function(){

  if(liters.value>1000){
    alert("⚠️ ใช้น้ำมันเกิน limit!");
  }

  await addDoc(collection(db,"fuel"),{
    station:currentUser,
    date:date.value,
    type:type.value,
    liters:Number(liters.value)
  });

  loadData();
};

async function loadData(){
  const snapshot=await getDocs(collection(db,"fuel"));
  let data=snapshot.docs.map(d=>d.data());

  data=data.filter(d=>d.station===currentUser);

  data.sort((a,b)=> new Date(a.date)-new Date(b.date));

  table.innerHTML="<tr><th>วันที่</th><th>ประเภท</th><th>ลิตร</th></tr>";

  let labels=[],diesel=[],benzine=[];
  let total=0,dTotal=0,bTotal=0;

  data.forEach(d=>{
    total+=d.liters;
    if(d.type==="Diesel") dTotal+=d.liters;
    if(d.type==="Benzine") bTotal+=d.liters;

    let r=table.insertRow();
    r.insertCell(0).innerText=d.date;
    r.insertCell(1).innerText=d.type;
    r.insertCell(2).innerText=d.liters;

    if(!labels.includes(d.date)) labels.push(d.date);
  });

  document.getElementById("total").innerText=total;
  document.getElementById("dieselTotal").innerText=dTotal;
  document.getElementById("benzineTotal").innerText=bTotal;

  labels.forEach(dt=>{
    let dSum=0,bSum=0;
    data.forEach(d=>{
      if(d.date===dt){
        if(d.type==="Diesel") dSum+=d.liters;
        if(d.type==="Benzine") bSum+=d.liters;
      }
    });
    diesel.push(dSum);
    benzine.push(bSum);
  });

  if(chart) chart.destroy();
  chart=new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels,
      datasets:[
        {label:"Diesel",data:diesel},
        {label:"Benzine",data:benzine}
      ]
    }
  });

  if(pieChart) pieChart.destroy();
  pieChart=new Chart(document.getElementById("pieChart"),{
    type:"pie",
    data:{
      labels:["Diesel","Benzine"],
      datasets:[{data:[dTotal,bTotal]}]
    }
  });
}

async function loadAll(){
  const snapshot=await getDocs(collection(db,"fuel"));
  const data=snapshot.docs.map(d=>d.data());

  let map={};

  data.forEach(d=>{
    if(!map[d.station]) map[d.station]=0;
    map[d.station]+=d.liters;
  });

  if(allChart) allChart.destroy();
  allChart=new Chart(document.getElementById("allChart"),{
    type:"bar",
    data:{
      labels:Object.keys(map),
      datasets:[{data:Object.values(map)}]
    }
  });
}

</script>

</body>
</html>
